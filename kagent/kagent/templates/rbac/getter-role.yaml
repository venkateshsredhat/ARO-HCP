{{- define "kagent.getter.rules" -}}
- apiGroups:
  - kagent.dev
  resources:
  - agents
  - modelconfigs
  - modelproviderconfigs
  - toolservers
  - memories
  - remotemcpservers
  - mcpservers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kagent.dev
  resources:
  - agents/finalizers
  - modelconfigs/finalizers
  - modelproviderconfigs/finalizers
  - toolservers/finalizers
  - memories/finalizers
  - remotemcpservers/finalizers
  - mcpservers/finalizers
  verbs:
  - update
- apiGroups:
  - kagent.dev
  resources:
  - agents/status
  - modelconfigs/status
  - modelproviderconfigs/status
  - toolservers/status
  - memories/status
  - remotemcpservers/status
  - mcpservers/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - "*"
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - "apps"
  resources:
  - "*"
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - "batch"
  resources:
  - "*"
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - "rbac.authorization.k8s.io"
  resources:
  - "*"
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - "*"
  verbs:
  - get
  - list
  - watch
{{- end -}}

{{- if .Values.rbac.clusterScoped }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kagent.fullname" . }}-getter-role
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
rules:
  {{- include "kagent.getter.rules" . | nindent 2 }}
{{- else }}
{{- $namespaces := .Values.rbac.namespaces | default (list (include "kagent.namespace" .)) }}
{{- range $namespace := $namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kagent.fullname" $ }}-getter-role
  namespace: {{ $namespace }}
  labels:
    {{- include "kagent.labels" $ | nindent 4 }}
rules:
  {{- include "kagent.getter.rules" $ | nindent 2 }}
{{- end }}
{{- end }}
