suite: test rbac
templates:
  - controller-serviceaccount.yaml
  - ui-serviceaccount.yaml
  - rbac/getter-role.yaml
  - rbac/writer-role.yaml
  - rbac/getter-rolebinding.yaml
  - rbac/writer-rolebinding.yaml
tests:
  - it: should render controller serviceaccount
    template: controller-serviceaccount.yaml
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-controller
      - hasDocuments:
          count: 1

  - it: should render ui serviceaccount
    template: ui-serviceaccount.yaml
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-ui
      - hasDocuments:
          count: 1

  - it: should render clusterroles by default
    asserts:
      - isKind:
          of: ClusterRole
        template: rbac/getter-role.yaml
      - isKind:
          of: ClusterRole
        template: rbac/writer-role.yaml

  - it: should have correct clusterrole names
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-getter-role
        template: rbac/getter-role.yaml
      - equal:
          path: metadata.name
          value: RELEASE-NAME-writer-role
        template: rbac/writer-role.yaml

  - it: should render clusterrolebindings by default
    asserts:
      - isKind:
          of: ClusterRoleBinding
        template: rbac/getter-rolebinding.yaml
      - isKind:
          of: ClusterRoleBinding
        template: rbac/writer-rolebinding.yaml

  - it: clusterrolebinding should reference correct serviceaccount
    template: rbac/getter-rolebinding.yaml
    asserts:
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - equal:
          path: subjects[0].name
          value: RELEASE-NAME-controller
      - equal:
          path: subjects[0].namespace
          value: NAMESPACE

  - it: clusterrolebindings should reference correct clusterroles
    asserts:
      - equal:
          path: roleRef.kind
          value: ClusterRole
        template: rbac/getter-rolebinding.yaml
      - equal:
          path: roleRef.name
          value: RELEASE-NAME-getter-role
        template: rbac/getter-rolebinding.yaml
      - equal:
          path: roleRef.kind
          value: ClusterRole
        template: rbac/writer-rolebinding.yaml
      - equal:
          path: roleRef.name
          value: RELEASE-NAME-writer-role
        template: rbac/writer-rolebinding.yaml

  - it: getter role should have read permissions
    template: rbac/getter-role.yaml
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["*"]
            verbs: ["get", "list", "watch"]

  - it: writer role should have write permissions
    template: rbac/writer-role.yaml
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["*"]
            verbs: ["create", "update", "patch", "delete"]

  - it: should use custom namespace when overridden
    set:
      namespaceOverride: "custom-namespace"
    templates:
      - controller-serviceaccount.yaml
      - ui-serviceaccount.yaml
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace

  - it: should have correct labels on all resources
    templates:
      - controller-serviceaccount.yaml
      - ui-serviceaccount.yaml
      - rbac/getter-role.yaml
      - rbac/writer-role.yaml
      - rbac/getter-rolebinding.yaml
      - rbac/writer-rolebinding.yaml
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: kagent
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: should render Roles when clusterScoped is false
    set:
      rbac.clusterScoped: false
    asserts:
      - isKind:
          of: Role
        template: rbac/getter-role.yaml
      - isKind:
          of: Role
        template: rbac/writer-role.yaml

  - it: should render RoleBindings when clusterScoped is false
    set:
      rbac.clusterScoped: false
    asserts:
      - isKind:
          of: RoleBinding
        template: rbac/getter-rolebinding.yaml
      - isKind:
          of: RoleBinding
        template: rbac/writer-rolebinding.yaml

  - it: should render multiple roles and bindings when namespaces are specified and clusterScoped is false
    set:
      rbac.clusterScoped: false
      rbac.namespaces:
        - ns1
        - ns2
    asserts:
      - hasDocuments:
          count: 2
        template: rbac/getter-role.yaml
      - equal:
          path: metadata.namespace
          value: ns1
        template: rbac/getter-role.yaml
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: ns2
        template: rbac/getter-role.yaml
        documentIndex: 1
      - hasDocuments:
          count: 2
        template: rbac/getter-rolebinding.yaml
      - equal:
          path: metadata.namespace
          value: ns1
        template: rbac/getter-rolebinding.yaml
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: ns2
        template: rbac/getter-rolebinding.yaml
        documentIndex: 1