apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: kagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      nodeSelector:
        workload: ai
      tolerations:
        - key: workload
          value: ai
          effect: NoSchedule
      containers:
        - name: ollama
          image: ollama/ollama:latest
          env:
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
          ports:
            - containerPort: 11434
          resources:
            requests:
              cpu: "2"
              memory: 12Gi
            limits:
              memory: 16Gi
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          emptyDir:
            sizeLimit: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: kagent
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
